<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Points & Connections</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 8px; color: #fff; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  label { font-size: 0.8rem; color: #aaa; }
  input[type=range] {
    width: 220px;
    accent-color: #5b8dee;
  }
  .stats {
    display: flex;
    gap: 32px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: #5b8dee;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: #888;
    margin-top: 4px;
  }
  canvas {
    border-radius: 12px;
    background: #161b27;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  .formula {
    margin-top: 16px;
    font-size: 0.85rem;
    color: #888;
    background: #161b27;
    padding: 10px 18px;
    border-radius: 8px;
  }
  .formula span { color: #5b8dee; font-weight: 600; }
</style>
</head>
<body>
<h1>Points & Connections</h1>
<p class="subtitle">See how connections grow as points are added</p>

<div class="stats">
  <div class="stat">
    <div class="stat-value" id="pointCount">2</div>
    <div class="stat-label">Points (n)</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="connCount">1</div>
    <div class="stat-label">Connections</div>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <label for="slider">Number of points: <strong id="sliderVal">2</strong></label>
    <input type="range" id="slider" min="1" max="30" value="2">
  </div>
  <div class="control-group">
    <label for="animToggle">Auto-increment</label>
    <button id="animToggle" style="padding:6px 14px;border-radius:6px;border:1px solid #5b8dee;background:transparent;color:#5b8dee;cursor:pointer;font-size:0.85rem;">Start</button>
  </div>
</div>

<canvas id="canvas" width="600" height="440"></canvas>

<div class="formula">
  Connections = <span>n × (n − 1) / 2</span> &nbsp;—&nbsp; quadratic growth O(n²)
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('slider');
const sliderVal = document.getElementById('sliderVal');
const pointCount = document.getElementById('pointCount');
const connCount = document.getElementById('connCount');
const animToggle = document.getElementById('animToggle');

// Resize canvas to fit container
function resizeCanvas() {
  const maxW = Math.min(600, window.innerWidth - 48);
  canvas.width = maxW;
  canvas.height = Math.round(maxW * 0.73);
  draw();
}

function getPoints(n) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = Math.min(canvas.width, canvas.height) * 0.38;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    pts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
  }
  return pts;
}

function draw() {
  const n = parseInt(slider.value);
  const connections = n > 1 ? n * (n - 1) / 2 : 0;

  sliderVal.textContent = n;
  pointCount.textContent = n;
  connCount.textContent = connections;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const pts = getPoints(n);

  // Draw connections
  const alpha = Math.max(0.04, Math.min(0.5, 1 / Math.sqrt(connections + 1)));
  ctx.strokeStyle = `rgba(91, 141, 238, ${alpha})`;
  ctx.lineWidth = 1;

  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      ctx.beginPath();
      ctx.moveTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[j].x, pts[j].y);
      ctx.stroke();
    }
  }

  // Draw points on top
  const dotR = n > 20 ? 4 : 6;
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, dotR, 0, 2 * Math.PI);
    ctx.fillStyle = '#5b8dee';
    ctx.shadowColor = '#5b8dee';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

slider.addEventListener('input', draw);
window.addEventListener('resize', resizeCanvas);

// Auto-increment animation
let animInterval = null;
animToggle.addEventListener('click', () => {
  if (animInterval) {
    clearInterval(animInterval);
    animInterval = null;
    animToggle.textContent = 'Start';
  } else {
    animToggle.textContent = 'Stop';
    animInterval = setInterval(() => {
      let v = parseInt(slider.value) + 1;
      if (v > parseInt(slider.max)) v = parseInt(slider.min);
      slider.value = v;
      draw();
    }, 600);
  }
});

resizeCanvas();
</script>
</body>
</html>
