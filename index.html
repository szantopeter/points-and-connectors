<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Points & Connections</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 8px; color: #fff; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 640px;
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .control-label {
    font-size: 0.8rem;
    color: #aaa;
    min-width: 130px;
    text-align: right;
  }
  input[type=range] { width: 160px; }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .step-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid #2a2f3f;
    background: #1c2133;
    color: #ccc;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
  }
  .step-btn:hover { background: #2a3150; color: #fff; }
  .auto-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid currentColor;
    background: transparent;
    cursor: pointer;
    font-size: 0.78rem;
    flex-shrink: 0;
  }
  .rings-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0 2px;
    border-top: 1px solid #2a2f3f;
    width: 100%;
    max-width: 640px;
    justify-content: center;
  }
  .rings-header span { font-size: 0.8rem; color: #aaa; }

  #ringRows { display: contents; }

  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat { text-align: center; }
  .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 0.75rem; color: #888; margin-top: 4px; }

  canvas {
    border-radius: 12px;
    background: #161b27;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  .formula {
    margin-top: 16px;
    font-size: 0.85rem;
    color: #888;
    background: #161b27;
    padding: 10px 18px;
    border-radius: 8px;
    text-align: center;
    line-height: 1.7;
  }
  .formula .hl { font-weight: 600; }
</style>
</head>
<body>
<h1>Points & Connections</h1>
<p class="subtitle">See how connections grow — and how rings reduce them</p>

<!-- Stats (dynamic) -->
<div class="stats" id="statsRow"></div>

<!-- Controls -->
<div class="controls">
  <!-- Outer points row -->
  <div class="control-row">
    <span class="control-label" style="color:#5b8dee">Outer points: <strong id="sliderOuterVal">10</strong></span>
    <div class="slider-row">
      <button class="step-btn" id="outerDec">−</button>
      <input type="range" id="sliderOuter" min="1" max="60" value="10" style="accent-color:#5b8dee">
      <button class="step-btn" id="outerInc">+</button>
    </div>
    <button class="auto-btn" id="outerAuto" style="color:#5b8dee">Start</button>
  </div>

  <!-- Rings header -->
  <div class="rings-header">
    <span>Inner rings:</span>
    <button class="step-btn" id="ringDec">−</button>
    <strong id="ringCountVal" style="font-size:0.9rem;min-width:16px;text-align:center">0</strong>
    <button class="step-btn" id="ringInc">+</button>
  </div>

  <!-- Dynamic ring rows injected here -->
  <div id="ringRows"></div>
</div>

<canvas id="canvas" width="600" height="440"></canvas>
<div class="formula" id="formula"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sliderOuter = document.getElementById('sliderOuter');
const sliderOuterVal = document.getElementById('sliderOuterVal');
const ringCountVal = document.getElementById('ringCountVal');
const statsRow = document.getElementById('statsRow');
const ringRowsEl = document.getElementById('ringRows');
const formula = document.getElementById('formula');

const OUTER_COLOR = '#5b8dee';
const RING_COLORS = ['#ee8d5b', '#5be89a', '#c45bee', '#ee5b8d', '#5beec4'];
const MAX_RINGS = 5;
const OUTER_R = 0.38;

// Data model
let rings = []; // [{count, animInterval}]
let outerAnimInterval = null;

// ── Geometry helpers ───────────────────────────────────────────────────────

function getCirclePoints(n, radiusFraction) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  if (n === 1) return [{ x: cx, y: cy }];
  const r = Math.min(canvas.width, canvas.height) * radiusFraction;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (2 * Math.PI * i / n) - Math.PI / 2;
    pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
  }
  return pts;
}

function nearestIndex(pt, pts) {
  let best = 0, bestD = Infinity;
  pts.forEach((p, i) => {
    const d = (pt.x - p.x) ** 2 + (pt.y - p.y) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

function ringRadii(numRings) {
  // evenly spaced from just inside outer to near center
  const inner = 0.06;
  return Array.from({ length: numRings }, (_, k) =>
    OUTER_R - (OUTER_R - inner) * (k + 1) / (numRings + 1)
  );
}

// ── Draw ───────────────────────────────────────────────────────────────────

function drawDots(pts, color, r) {
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, 2 * Math.PI);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

function drawEdges(fromPts, toPts, color) {
  const alpha = Math.max(0.05, Math.min(0.6, 1 / Math.sqrt(fromPts.length + 1)));
  ctx.strokeStyle = color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace('rgba(', '#') ;
  // simpler approach: parse hex to rgba
  ctx.strokeStyle = hexAlpha(color, alpha);
  ctx.lineWidth = 1;
  fromPts.forEach(fp => {
    const ni = nearestIndex(fp, toPts);
    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    ctx.lineTo(toPts[ni].x, toPts[ni].y);
    ctx.stroke();
  });
}

function drawMesh(pts, color) {
  if (pts.length < 2) return;
  const conns = pts.length * (pts.length - 1) / 2;
  const alpha = Math.max(0.08, Math.min(0.7, 1 / Math.sqrt(conns + 1)));
  ctx.strokeStyle = hexAlpha(color, alpha);
  ctx.lineWidth = 1;
  for (let i = 0; i < pts.length; i++)
    for (let j = i + 1; j < pts.length; j++) {
      ctx.beginPath();
      ctx.moveTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[j].x, pts[j].y);
      ctx.stroke();
    }
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function draw() {
  const n = parseInt(sliderOuter.value);
  sliderOuterVal.textContent = n;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Build active rings (skip rings with count 0 for drawing but keep for stats)
  const activeRings = rings.filter(r => r.count > 0);
  const numActive = activeRings.length;

  if (numActive === 0) {
    // Direct mode
    const pts = getCirclePoints(n, OUTER_R);
    drawMesh(pts, OUTER_COLOR);
    drawDots(pts, OUTER_COLOR, n > 30 ? 3 : n > 20 ? 4 : 5);
    const conns = n > 1 ? n * (n - 1) / 2 : 0;
    updateStats(n, conns, null);
    formula.innerHTML = `Connections = <span class="hl" style="color:${OUTER_COLOR}">n × (n − 1) / 2</span> &nbsp;—&nbsp; quadratic growth O(n²)`;
    return;
  }

  // Build all point sets
  const radii = ringRadii(numActive);
  const pointSets = [getCirclePoints(n, OUTER_R)];
  activeRings.forEach((r, k) => pointSets.push(getCirclePoints(r.count, radii[k])));
  const colors = [OUTER_COLOR, ...activeRings.map((_, k) => RING_COLORS[k % RING_COLORS.length])];

  // Draw edges outer→ring1, ring1→ring2, ...
  for (let k = 0; k < pointSets.length - 1; k++) {
    drawEdges(pointSets[k], pointSets[k + 1], colors[k]);
  }
  // Draw innermost ring mesh
  drawMesh(pointSets[pointSets.length - 1], colors[colors.length - 1]);

  // Draw dots (back to front so outer is on top)
  for (let k = pointSets.length - 1; k >= 0; k--) {
    const cnt = pointSets[k].length;
    const dotR = k === 0 ? (n > 30 ? 3 : n > 20 ? 4 : 5) : 6;
    drawDots(pointSets[k], colors[k], dotR);
  }

  // Count connections
  let hubTotal = 0;
  for (let k = 0; k < pointSets.length - 1; k++) hubTotal += pointSets[k].length; // each→nearest
  const inn = pointSets[pointSets.length - 1].length;
  hubTotal += inn > 1 ? inn * (inn - 1) / 2 : 0;
  const directEquiv = n > 1 ? n * (n - 1) / 2 : 0;
  const saving = directEquiv - hubTotal;
  const savingPct = directEquiv > 0 ? Math.round(saving / directEquiv * 100) : 0;

  updateStats(n, hubTotal, saving);

  const savStr = saving >= 0
    ? `saves <span class="hl" style="color:#5be89a">${saving} connections (${savingPct}%)</span>`
    : `<span style="color:#ee8d5b">${Math.abs(saving)} more connections than direct</span>`;
  formula.innerHTML =
    `Hub total = <span class="hl" style="color:#5be89a">${hubTotal}</span> &nbsp;—&nbsp; ` +
    `vs direct <span class="hl" style="color:${OUTER_COLOR}">n×(n−1)/2 = ${directEquiv}</span><br>` + savStr;
}

// ── Stats ──────────────────────────────────────────────────────────────────

function updateStats(n, total, saving) {
  statsRow.innerHTML = '';
  const add = (val, label, color) => {
    const d = document.createElement('div');
    d.className = 'stat';
    d.innerHTML = `<div class="stat-value" style="color:${color}">${val}</div><div class="stat-label">${label}</div>`;
    statsRow.appendChild(d);
  };
  add(n, 'Outer points (n)', OUTER_COLOR);
  rings.forEach((r, k) => {
    const color = RING_COLORS[k % RING_COLORS.length];
    add(r.count, `Ring ${k + 1} hubs`, color);
  });
  add(total, 'Total connections', '#5be89a');
  if (saving !== null) add(saving, 'Connections saved', '#5be89a');
}

// ── Ring controls ──────────────────────────────────────────────────────────

function renderRingControls() {
  // Stop any running intervals for removed rings
  rings.forEach(r => { if (r.animInterval) { clearInterval(r.animInterval); r.animInterval = null; } });

  ringRowsEl.innerHTML = '';
  ringCountVal.textContent = rings.length;

  rings.forEach((ring, k) => {
    const color = RING_COLORS[k % RING_COLORS.length];
    const row = document.createElement('div');
    row.className = 'control-row';
    row.dataset.ringIdx = k;

    const sliderId = `sliderRing${k}`;
    const valId = `ringVal${k}`;
    const decId = `ringDec${k}`;
    const incId = `ringInc${k}`;
    const autoId = `ringAuto${k}`;

    row.innerHTML = `
      <span class="control-label" style="color:${color}">Ring ${k + 1} hubs: <strong id="${valId}">${ring.count}</strong></span>
      <div class="slider-row">
        <button class="step-btn" id="${decId}">−</button>
        <input type="range" id="${sliderId}" min="0" max="20" value="${ring.count}" style="accent-color:${color}">
        <button class="step-btn" id="${incId}">+</button>
      </div>
      <button class="auto-btn" id="${autoId}" style="color:${color}">Start</button>
    `;
    ringRowsEl.appendChild(row);

    const slider = row.querySelector(`#${sliderId}`);
    const valEl = row.querySelector(`#${valId}`);

    slider.addEventListener('input', () => {
      rings[k].count = parseInt(slider.value);
      valEl.textContent = slider.value;
      draw();
    });

    function stepRing(delta) {
      const v = Math.min(20, Math.max(0, rings[k].count + delta));
      rings[k].count = v;
      slider.value = v;
      valEl.textContent = v;
      draw();
    }

    bindHold(row.querySelector(`#${decId}`), () => stepRing(-1));
    bindHold(row.querySelector(`#${incId}`), () => stepRing(+1));

    const autoBtn = row.querySelector(`#${autoId}`);
    autoBtn.addEventListener('click', () => {
      if (rings[k].animInterval) {
        clearInterval(rings[k].animInterval);
        rings[k].animInterval = null;
        autoBtn.textContent = 'Start';
      } else {
        rings[k].animInterval = setInterval(() => {
          const v = rings[k].count >= 20 ? 0 : rings[k].count + 1;
          rings[k].count = v;
          slider.value = v;
          valEl.textContent = v;
          draw();
        }, 600);
        autoBtn.textContent = 'Stop';
      }
    });
  });

  draw();
}

// ── Hold-to-repeat ─────────────────────────────────────────────────────────

function bindHold(btn, fn) {
  let timeout = null, interval = null;
  function start() {
    fn();
    timeout = setTimeout(() => { interval = setInterval(fn, 80); }, 400);
  }
  function stop() { clearTimeout(timeout); clearInterval(interval); timeout = interval = null; }
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchstart', e => { e.preventDefault(); start(); });
  btn.addEventListener('touchend', stop);
}

// ── Outer slider + step buttons ────────────────────────────────────────────

sliderOuter.addEventListener('input', draw);
bindHold(document.getElementById('outerDec'), () => {
  sliderOuter.value = Math.max(1, parseInt(sliderOuter.value) - 1); draw();
});
bindHold(document.getElementById('outerInc'), () => {
  sliderOuter.value = Math.min(60, parseInt(sliderOuter.value) + 1); draw();
});

// Outer auto-increment
const outerAutoBtn = document.getElementById('outerAuto');
outerAutoBtn.addEventListener('click', () => {
  if (outerAnimInterval) {
    clearInterval(outerAnimInterval);
    outerAnimInterval = null;
    outerAutoBtn.textContent = 'Start';
  } else {
    outerAnimInterval = setInterval(() => {
      sliderOuter.value = parseInt(sliderOuter.value) >= 60 ? 1 : parseInt(sliderOuter.value) + 1;
      draw();
    }, 600);
    outerAutoBtn.textContent = 'Stop';
  }
});

// ── Add/remove rings ───────────────────────────────────────────────────────

document.getElementById('ringInc').addEventListener('click', () => {
  if (rings.length < MAX_RINGS) {
    rings.push({ count: 4, animInterval: null });
    renderRingControls();
  }
});
document.getElementById('ringDec').addEventListener('click', () => {
  if (rings.length > 0) {
    const last = rings.pop();
    if (last.animInterval) clearInterval(last.animInterval);
    renderRingControls();
  }
});

// ── Canvas resize ──────────────────────────────────────────────────────────

function resizeCanvas() {
  const maxW = Math.min(600, window.innerWidth - 48);
  canvas.width = maxW;
  canvas.height = Math.round(maxW * 0.73);
  draw();
}
window.addEventListener('resize', resizeCanvas);

// ── Init ───────────────────────────────────────────────────────────────────
resizeCanvas();
</script>
</body>
</html>
